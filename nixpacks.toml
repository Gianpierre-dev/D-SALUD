# Configuración de despliegue para Railway / Nixpacks.
#
# El servicio web ejecuta el comando definido en [start]. Para los servicios
# adicionales (queue worker y scheduler) crear servicios separados en Railway
# apuntando al mismo repositorio con los comandos:
#   - Worker:    php artisan queue:work --tries=3 --max-time=3600
#   - Scheduler: php artisan schedule:work

[phases.setup]
nixPkgs = ["nodejs_20", "php82", "php82Extensions.zip", "php82Extensions.gd", "php82Extensions.intl"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "npm run build",
]

[phases.deploy]
cmds = [
    "php artisan migrate --force",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
    "php artisan storage:link || true",
]

# `php artisan serve` está pensado para desarrollo (single-threaded, cliente HTTP
# básico). En producción el plan oficial es:
#   - usar el buildpack de PHP de Nixpacks que arranca nginx + php-fpm, o
#   - migrar a FrankenPHP / Laravel Octane si se necesita más throughput.
# Mientras tanto, este start funciona en Railway para tráfico bajo del TAP.
[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
